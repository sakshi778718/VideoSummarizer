<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SummAI.yt — AI Video Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b 0%, #0f172a 100%);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glow-hover:hover {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        /* Markdown Formatting Specific Rules */
        .markdown-body h2, .markdown-body h3 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #3b82f6;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.25rem;
        }
        .markdown-body ul {
            list-style-type: disc;
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }
        .markdown-body li {
            margin-bottom: 0.5rem;
            color: #cbd5e1;
        }
        .markdown-body p {
            margin-bottom: 1rem;
            color: #e2e8f0;
            line-height: 1.7;
        }
        .markdown-body strong {
            color: #f8fafc;
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex items-center justify-center p-4 sm:p-6 lg:p-8">

    <div class="w-full max-w-4xl glass-card rounded-2xl shadow-2xl p-6 sm:p-10 transition-all duration-300">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-blue-500/10 text-blue-400 text-xs font-semibold mb-3 border border-blue-500/20">
                ⚡ Powered by GPT-4o-mini
            </div>
            <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight bg-gradient-to-r from-white via-slate-200 to-blue-400 bg-clip-text text-transparent">
                SummAI<span class="text-blue-500">.yt</span>
            </h1>
            <p class="text-slate-400 mt-2 max-w-md mx-auto text-sm sm:text-base">
                Drop any YouTube video link below to parse structured transcripts and generate high-density summaries.
            </p>
        </div>

        <div class="space-y-4">
            <div class="flex flex-col sm:flex-row gap-3">
                <div class="relative flex-1">
                    <input 
                        type="text" 
                        id="videoUrl" 
                        placeholder="Paste YouTube link here (e.g., https://youtu.be/...)" 
                        class="w-full px-4 py-3.5 bg-slate-900/60 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                    >
                </div>
                <button 
                    id="submitBtn" 
                    onclick="generateSummary()" 
                    class="glow-hover px-6 py-3.5 bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 disabled:cursor-not-allowed text-white font-semibold rounded-xl shadow-lg shadow-blue-600/20 transition-all duration-200 whitespace-nowrap"
                >
                    Generate Summary
                </button>
            </div>
        </div>

        <div id="loader" class="hidden mt-12 text-center space-y-4">
            <div class="inline-block w-8 h-8 border-4 border-blue-500/30 border-t-blue-500 rounded-full animate-spin"></div>
            <p class="text-sm text-slate-400 animate-pulse font-medium">
                Extracting transcript and synthesizing insights...
            </p>
        </div>

        <div id="resultBox" class="hidden mt-10 border-t border-slate-800 pt-8">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold text-slate-200 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
                    AI Executive Insights
                </h3>
                <button 
                    onclick="navigator.clipboard.writeText(document.getElementById('resultText').innerText); alert('Copied to clipboard!')"
                    class="text-xs text-slate-400 hover:text-white px-2.5 py-1.5 rounded-md bg-slate-800 border border-slate-700 transition-all"
                >
                    Copy Output
                </button>
            </div>
            
            <div class="bg-slate-950/50 border border-slate-800 rounded-xl p-5 sm:p-6 custom-scroll overflow-y-auto max-h-[500px]">
                <div id="resultText" class="markdown-body text-sm sm:text-base text-slate-300"></div>
            </div>
        </div>
    </div>

    <script>
        async function generateSummary() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');

            if (!urlInput) {
                alert('Please provide a valid YouTube link.');
                return;
            }

            submitBtn.disabled = true;
            loader.classList.remove('hidden');
            resultBox.classList.add('hidden');

            const API_URL = "https://videosummarizer-rdw7.onrender.com/api/v1/summarize";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ video_url: urlInput })
                });

                const data = await response.json();

                if (response.ok) {
                    resultText.innerHTML = marked.parse(data.summary);
                } else {
                    const errorMsg = typeof data.detail === 'object' 
                        ? JSON.stringify(data.detail, null, 2) 
                        : (data.detail || 'Internal server processing error.');
                    
                    resultText.innerHTML = `
                        <div class="text-red-400 font-bold flex items-center gap-2 mb-2 text-base">
                            ⚠️ Request Interrupted
                        </div>
                        <div class="text-slate-300 text-xs sm:text-sm bg-red-950/20 border border-red-500/20 p-4 rounded-xl leading-relaxed break-words whitespace-pre-wrap max-h-[300px] overflow-y-auto custom-scroll">
                            ${errorMsg}
                        </div>
                    `;
                }
            } catch (error) {
                resultText.innerHTML = `
                    <div class="text-red-400 font-bold flex items-center gap-2 mb-2 text-base">
                        ⚠️ Connection Refused
                    </div>
                    <p class="text-sm text-slate-400 leading-relaxed">
                        Unable to communicate with your Render service backend. Verify that the server instance isn't spun down or idling.
                    </p>
                `;
                console.error(error);
            } finally {
                submitBtn.disabled = false;
                loader.classList.add('hidden');
                resultBox.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
