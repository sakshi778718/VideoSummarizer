<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Summarizer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            margin: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #334155;
            border-radius: 6px;
            background-color: #0f172a;
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            padding: 0.75rem 1.5rem;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        .result-box {
            margin-top: 2rem;
            padding: 1rem;
            background-color: #0f172a;
            border-left: 4px solid var(--accent-color);
            border-radius: 4px;
            display: none;
        }

        .result-box h3 {
            margin-top: 0;
            margin-bottom: 0.5rem;
            color: var(--accent-color);
        }

        .result-text {
            line-height: 1.6;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }

        .loader {
            display: none;
            text-align: center;
            color: var(--text-muted);
            margin-top: 1rem;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Video Summarizer AI</h1>
        <p class="subtitle">Enter a YouTube video URL below to fetch its AI-generated summary.</p>

        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." required>
            <button id="submitBtn" onclick="generateSummary()">Generate Summary</button>
        </div>

        <div id="loader" class="loader">Processing transcript and creating summary... Please wait...</div>

        <div id="resultBox" class="result-box">
            <h3>AI Summary Output:</h3>
            <div id="resultText" class="result-text"></div>
        </div>
    </div>

    <script>
        async function generateSummary() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');

            if (!urlInput) {
                alert('Please enter a YouTube link first.');
                return;
            }

            // UI Feedback State
            submitBtn.disabled = true;
            loader.style.display = 'block';
            resultBox.style.display = 'none';

            // Targeted production URL for Render deployment
            const API_URL = "https://videosummarizer-rdw7.onrender.com/api/v1/summarize";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ video_url: urlInput })
                });

                const data = await response.json();

                if (response.ok) {
                    resultText.innerText = data.summary;
                    resultText.style.color = '#f8fafc';
                } else {
                    // Safe handling of string errors vs validation objects/arrays
                    const errorMsg = typeof data.detail === 'object' 
                        ? JSON.stringify(data.detail, null, 2) 
                        : (data.detail || 'Failed to process video.');
                    
                    resultText.innerText = `Error: ${errorMsg}`;
                    resultText.style.color = '#ef4444';
                }
            } catch (error) {
                resultText.innerText = 'Unable to connect to backend server. Ensure the service is active on Render.';
                resultText.style.color = '#ef4444';
                console.error("Fetch error details:", error);
            } finally {
                submitBtn.disabled = false;
                loader.style.display = 'none';
                resultBox.style.display = 'block';
            }
        }
    </script>
</body>
</html>
